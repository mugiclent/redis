# redis.conf — edit here, commit, push. GitHub Actions will restart the container.

# ─── NETWORK ──────────────────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode yes

# ─── AUTH ─────────────────────────────────────────────────────────────────────
# Password is injected at runtime — do not hardcode here.
# The deploy pipeline writes it via: redis-cli CONFIG SET requirepass <secret>
# This placeholder ensures protected-mode stays enforced until that runs.
requirepass REDIS_PASSWORD_PLACEHOLDER

# ─── MEMORY ───────────────────────────────────────────────────────────────────
# Maximum RAM Redis may use before evicting keys.
# Set this below total server RAM to leave headroom for the OS and other services.
maxmemory 3gb

# Eviction policy when maxmemory is reached:
#   allkeys-lru   — evict any key, least recently used first (good for caching)
#   volatile-lru  — evict only keys with a TTL set (good for session store)
maxmemory-policy allkeys-lru

# ─── PERSISTENCE ──────────────────────────────────────────────────────────────
# RDB snapshots — lightweight periodic saves
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb

# AOF — append-only log, survives crashes with at most 1s of data loss
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Both RDB and AOF are on. Redis uses AOF on restart (more durable),
# RDB for faster cold-start when AOF is not available.

# ─── LOGGING ──────────────────────────────────────────────────────────────────
loglevel notice

# ─── GENERAL ──────────────────────────────────────────────────────────────────
databases 16
hz 10
